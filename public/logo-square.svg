<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="128" fill="#382f2c"/>
  <g transform="translate(112, 120) scale(3.0)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left Horn (curved) -->
    <path d="M 38 25 Q 28 8, 32 2" stroke="#faf9f6" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right Horn (curved) -->
    <path d="M 58 25 Q 68 8, 64 2" stroke="#faf9f6" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Main Head Shape -->
    <ellipse cx="48" cy="48" rx="20" ry="24" fill="#faf9f6"/>
    
    <!-- Left Ear -->
    <ellipse cx="32" cy="38" rx="5" ry="8" fill="#faf9f6" transform="rotate(-25 32 38)"/>
    <!-- Right Ear -->
    <ellipse cx="64" cy="38" rx="5" ry="8" fill="#faf9f6" transform="rotate(25 64 38)"/>
    
    <!-- Face/Snout -->
    <ellipse cx="48" cy="52" rx="14" ry="16" fill="#eae7df"/>
    
    <!-- Beard/Chin -->
    <path d="M 42 65 Q 48 74, 54 65" stroke="#faf9f6" stroke-width="6" fill="none" stroke-linecap="round"/>
    
    <!-- Left nostril -->
    <circle cx="42" cy="48" r="2" fill="#382f2c"/>
    <!-- Right nostril -->
    <circle cx="54" cy="48" r="2" fill="#382f2c"/>
  </g>
</svg>
